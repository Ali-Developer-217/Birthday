<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish for Mahnoor</title>
    <link rel="stylesheet" href="wish-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="flower-container" id="flowerContainer"></div>

    <div class="wish-card">
        <h1 class="animated-text">Happy Birthday, Mahnoor!</h1>
        <div class="note-content">
            <p class="wish-line">May your day be as beautiful as a garden in full bloom.</p>
            <p class="wish-line">Wishing you a year filled with love, laughter, and endless joy.</p>
            <p class="wish-line">You are special, unique, and truly wonderful!</p>
            <p class="signature">With love and best wishes. ✨</p>
        </div>
        <button class="restart-btn" onclick="window.location.href='index.html'">Restart Celebration 🎈</button>
    </div>

    <script src="wish-script.js"></script>
</body>
